<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Yuki Dashboard</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        padding: 30px;
      }

      .dashboard {
        max-width: 1200px;
        margin: auto;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
      }

      /* LEFT SIDE */

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .card {
        background: #1e2330;
        border: 1px solid #2d3448;
        border-radius: 16px;
        padding: 20px;
      }

      .card h2 {
        color: white;
        margin-bottom: 15px;
        font-size: 1.2rem;
      }

      /* CLOCK */

      #clock {
        font-size: 2.5rem;
        font-weight: 700;
        color: #f59e0b;
      }

      .info {
        margin-top: 10px;
        color: #94a3b8;
      }

      /* TODO */

      #todo-input {
        width: 100%;
        padding: 10px;
        background: #0f1117;
        border: 1px solid #334155;
        color: white;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      button {
        background: #f59e0b;
        border: none;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }

      #todo-list {
        margin-top: 15px;
        list-style: none;
      }

      #todo-list li {
        background: #111827;
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 8px;
        cursor: pointer;
      }

      /* BUS */

      .bus-panel {
        background: #1e2330;
        border: 1px solid #2d3448;
        border-radius: 16px;
        padding: 25px;
      }

      header {
        text-align: center;
        margin-bottom: 25px;
      }

      .badge {
        display: inline-block;
        background: #f59e0b;
        color: #111827;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: bold;
      }

      header h1 {
        margin-top: 10px;
        color: white;
      }

      #last-updated {
        color: #64748b;
      }

      .bus-card {
        margin-top: 15px;
        background: #111827;
        border-radius: 14px;
        padding: 20px;
        display: flex;
        justify-content: space-between;
      }

      .route {
        color: #f59e0b;
        font-size: 1.5rem;
        font-weight: bold;
      }

      .minutes {
        font-size: 2rem;
        font-weight: bold;
      }

      #status {
        text-align: center;
        padding: 20px;
        color: #94a3b8;
      }

      .error {
        color: #f87171 !important;
      }

      @media (max-width: 800px) {
        .dashboard {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <!-- LEFT -->

      <aside class="sidebar">
        <div class="card">
          <h2>🌤 Brisbane Weather</h2>

          <div id="🕒 clock">--:--</div>

          <div class="info">Weather: <span id="weather">Loading...</span></div>

          <div class="info">UV Index: <span id="uv">--</span></div>
        </div>

        <div class="card">
          <h2>To-do List</h2>

          <input id="todo-input" placeholder="New task" />

          <button onclick="addTodo()">Add</button>

          <ul id="todo-list"></ul>
        </div>
      </aside>

      <!-- RIGHT -->

      <main class="bus-panel">
        <header>
          <div class="badge">LIVE</div>

          <h1>🚌 Route 555</h1>

          <p>Loganholme — Stop 600656</p>
        </header>

        <div id="last-updated">Loading...</div>

        <div id="bus-list">
          <div id="status">Fetching live data...</div>
        </div>
      </main>
    </div>

    <script>
      /* CLOCK */

      function updateClock() {
        const now = new Date();

        document.getElementById("clock").textContent = now.toLocaleTimeString(
          "en-AU",
          {
            timeZone: "Australia/Brisbane",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: true,
          },
        );
      }

      setInterval(updateClock, 1000);
      updateClock();

      /*Weather*/
      async function fetchWeather() {
        try {
          const res = await fetch("https://yuki-dashboard.replit.app/weather");

          if (!res.ok) {
            throw new Error(res.status);
          }

          const data = await res.json();

          document.getElementById("weather").textContent =
            `${data.temperature}°C`;

          document.getElementById("uv").textContent = data.uv;
        } catch (err) {
          document.getElementById("weather").textContent = "Unavailable";

          document.getElementById("uv").textContent = "--";

          console.log(err);
        }
      }

      fetchWeather();
      setInterval(fetchWeather, 600000);

      /* TODO */

      let todos = JSON.parse(localStorage.getItem("todos") || "[]");

      function renderTodos() {
        const list = document.getElementById("todo-list");

        list.innerHTML = "";

        todos.forEach((todo, index) => {
          const li = document.createElement("li");

          li.textContent = todo;

          li.onclick = function () {
            todos.splice(index, 1);

            localStorage.setItem("todos", JSON.stringify(todos));

            renderTodos();
          };

          list.appendChild(li);
        });
      }

      function addTodo() {
        const input = document.getElementById("todo-input");

        if (input.value.trim()) {
          todos.push(input.value);

          localStorage.setItem("todos", JSON.stringify(todos));

          input.value = "";

          renderTodos();
        }
      }

      renderTodos();

      /* BUS */

      async function fetchBuses() {
        const list = document.getElementById("bus-list");

        try {
          const res = await fetch("https://yuki-dashboard.replit.app/buses");

          if (!res.ok) throw new Error(res.status);

          const data = await res.json();

          document.getElementById("last-updated").textContent =
            "Updated " + new Date(data.fetchedAt).toLocaleTimeString();

          list.innerHTML = "";

          if (!data.buses.length) {
            list.innerHTML = "<div id='status'>No upcoming buses</div>";

            return;
          }

          data.buses.forEach((bus) => {
            const div = document.createElement("div");

            div.className = "bus-card";

            div.innerHTML = `

<div>

<div class="route">
Route 555
</div>

<div>
Trip ${bus.tripId || "-"}
</div>

</div>


<div>

<div class="minutes">
${bus.minutesAway || bus.minutes} min
</div>

</div>

`;

            list.appendChild(div);
          });
        } catch (err) {
          list.innerHTML =
            "<div class='error'>Error: " + err.message + "</div>";
        }
      }

      fetchBuses();

      setInterval(fetchBuses, 60000);
    </script>
  </body>
</html>
